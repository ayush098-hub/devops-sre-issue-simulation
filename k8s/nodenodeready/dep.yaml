apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        resources:
          requests:
            cpu: 1
          limits:
            cpu: 1
