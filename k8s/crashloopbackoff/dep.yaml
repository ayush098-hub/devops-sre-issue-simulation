apiVersion: apps/v1
kind: Deployment
metadata:
 name: my-dep
 labels:
  app: my-app
spec:
  replicas: 1
  selector:
   matchLabels:
    app: my-app
  template:
   metadata:
    labels:
     app: my-app
   spec:
    containers:
    - name: my-cont
      image: nginx:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          if [ -z "$DATABASE_URL" ]; then
            echo "FATAL: DATABASE_URL not set"
            exit 1
          fi
          echo "App started"
          sleep 3600
      env:
       - name: DATABASE_URL
         value: "postgres"
